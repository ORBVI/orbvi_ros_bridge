stages:
  - docker
  - test

variables:
  GIT_SUBMODULE_STRATEGY: none
  DEBIAN_FRONTEND: noninteractive
  HARBOR_REGISTRY: harbor.huanshizhineng.com:18803
  DOCKER_CLI_IMAGE: harbor.huanshizhineng.com:18803/dockerhub/docker:27-cli
  DOCKER_BUILDKIT_IMAGE: harbor.huanshizhineng.com:18803/dockerhub/moby/buildkit:buildx-stable-1
  CI_IMAGE_REPOSITORY: harbor.huanshizhineng.com:18803/omnisense/orbvi_ros_bridge_ci
  BASE_IMAGE: harbor.huanshizhineng.com:18803/dockerhub/ubuntu:20.04
  APT_MIRROR: aliyun
  ROS_APT_MIRROR: aliyun

.docker_build_base:
  stage: docker
  image: ${DOCKER_CLI_IMAGE}
  timeout: 3h
  interruptible: true
  variables:
    GIT_DEPTH: "1"
    DOCKER_BUILDKIT: "1"
    DOCKER_HOST: unix:///var/run/docker.sock
    PUSH: "0"
    BUILDKIT_PROGRESS: plain
    IMAGE_REPOSITORY: harbor.huanshizhineng.com:18803/omnisense/orbvi_ros_bridge_ci
  before_script:
    - mkdir -p docker/ci/manifests
    - mkdir -p docker/ci/logs
    - touch docker/ci/manifests/.ci-keep
    - docker info
    - docker buildx version
    - |
      if [ -n "${HARBOR_USERNAME:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
        printf '%s' "${HARBOR_PASSWORD}" | docker login "${HARBOR_REGISTRY}" --username "${HARBOR_USERNAME}" --password-stdin
      elif [ -n "${DOCKER_AUTH_CONFIG:-}" ]; then
        mkdir -p "${HOME}/.docker"
        printf '%s' "${DOCKER_AUTH_CONFIG}" > "${HOME}/.docker/config.json"
        echo "Using DOCKER_AUTH_CONFIG for Docker registry authentication."
      elif [ "${PUSH:-0}" = "1" ]; then
        echo "ERROR: set HARBOR_USERNAME/HARBOR_PASSWORD or DOCKER_AUTH_CONFIG GitLab CI variables for ${HARBOR_REGISTRY}." >&2
        exit 1
      else
        echo "WARN: Harbor credentials are not set; continuing without docker login for PUSH=0."
      fi
    - docker buildx create --use --name "orbvi-ros-bridge-${CI_JOB_ID}" --driver docker-container --driver-opt "image=${DOCKER_BUILDKIT_IMAGE}" || docker buildx use "orbvi-ros-bridge-${CI_JOB_ID}"
    - docker buildx inspect --bootstrap
  script:
    - docker/ci/build.sh
  after_script:
    - docker buildx rm "orbvi-ros-bridge-${CI_JOB_ID}" || true

.docker_check_base:
  variables:
    PUSH: "0"
  script:
    - docker/ci/build.sh
    - |
      image_env="docker/ci/manifests/ci-images-${CI_COMMIT_SHORT_SHA}.env"
      . "${image_env}"
      image_var="$(printf '%s_IMAGE' "${ROS_TARGETS}" | tr '[:lower:]' '[:upper:]')"
      eval "test_image=\${${image_var}}"
      docker/ci/run_bridge_tests_in_image.sh "${ROS_TARGETS}" "${test_image}"
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      changes: &ci_image_inputs
        - .dockerignore
        - .gitlab-ci.yml
        - docker/ci/**/*
        - ci/livox_ros_driver2_msgs/**/*
        - orbvi_ros_bridge/**/*
        - third_party/orbvi_sdk/**/*
    - when: never

.docker_push_base:
  variables:
    PUSH: "1"
  rules: &default_or_tag_rules
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *ci_image_inputs
    - when: never

.docker_ubuntu_x86_64:
  extends: .docker_build_base
  tags:
    - ubuntu
  variables:
    PLATFORMS: linux/amd64
    IMAGE_ARCH: amd64

.docker_orbvi_arm64:
  extends: .docker_build_base
  tags:
    - orbvi
  variables:
    PLATFORMS: linux/arm64
    IMAGE_ARCH: arm64

docker:ros1:ubuntu:x86_64:check:
  extends:
    - .docker_ubuntu_x86_64
    - .docker_check_base
  variables:
    ROS_TARGETS: ros1

docker:ros1:orbvi:arm64:check:
  extends:
    - .docker_orbvi_arm64
    - .docker_check_base
  variables:
    ROS_TARGETS: ros1

docker:ros2:ubuntu:x86_64:check:
  extends:
    - .docker_ubuntu_x86_64
    - .docker_check_base
  variables:
    ROS_TARGETS: ros2

docker:ros2:orbvi:arm64:check:
  extends:
    - .docker_orbvi_arm64
    - .docker_check_base
  variables:
    ROS_TARGETS: ros2

docker:ros1:ubuntu:x86_64:
  extends:
    - .docker_ubuntu_x86_64
    - .docker_push_base
  variables:
    ROS_TARGETS: ros1

docker:ros1:orbvi:arm64:
  extends:
    - .docker_orbvi_arm64
    - .docker_push_base
  variables:
    ROS_TARGETS: ros1

docker:ros2:ubuntu:x86_64:
  extends:
    - .docker_ubuntu_x86_64
    - .docker_push_base
  variables:
    ROS_TARGETS: ros2

docker:ros2:orbvi:arm64:
  extends:
    - .docker_orbvi_arm64
    - .docker_push_base
  variables:
    ROS_TARGETS: ros2

.ros_common:
  stage: test
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/ci_ws/src"
    - mkdir -p "${CI_PROJECT_DIR}/ci_ws/build" "${CI_PROJECT_DIR}/ci_ws/devel" "${CI_PROJECT_DIR}/ci_ws/install" "${CI_PROJECT_DIR}/ci_ws/log"
    - touch "${CI_PROJECT_DIR}/ci_ws/build/.ci-keep" "${CI_PROJECT_DIR}/ci_ws/devel/.ci-keep" "${CI_PROJECT_DIR}/ci_ws/install/.ci-keep" "${CI_PROJECT_DIR}/ci_ws/log/.ci-keep"
    - c++ --version

.ros1_test:
  extends: .ros_common
  script:
    - ln -s "${CI_PROJECT_DIR}/orbvi_ros_bridge" "${CI_PROJECT_DIR}/ci_ws/src/orbvi_ros_bridge"
    - ln -s "${CI_PROJECT_DIR}/ci/livox_ros_driver2_msgs" "${CI_PROJECT_DIR}/ci_ws/src/livox_ros_driver2"
    - source /opt/ros/noetic/setup.bash
    - cd "${CI_PROJECT_DIR}/ci_ws"
    - catkin_make -DCMAKE_BUILD_TYPE=Release -DCATKIN_ENABLE_TESTING=ON
    - catkin_make run_tests_orbvi_ros_bridge
    - catkin_test_results

.ros2_test:
  extends: .ros_common
  script:
    - ln -s "${CI_PROJECT_DIR}/orbvi_ros_bridge" "${CI_PROJECT_DIR}/ci_ws/src/orbvi_ros_bridge"
    - ln -s "${CI_PROJECT_DIR}/ci/livox_ros_driver2_msgs" "${CI_PROJECT_DIR}/ci_ws/src/livox_ros_driver2"
    - source /opt/ros/foxy/setup.bash
    - cd "${CI_PROJECT_DIR}/ci_ws"
    - colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release
    - colcon test --packages-select orbvi_ros_bridge
    - colcon test-result --verbose

ros1:ubuntu:x86_64:
  extends: .ros1_test
  image: ${CI_IMAGE_REPOSITORY}:ros1-focal-${CI_COMMIT_SHORT_SHA}-amd64
  needs:
    - docker:ros1:ubuntu:x86_64
  tags:
    - ubuntu
  rules: *default_or_tag_rules

ros1:orbvi:arm64:
  extends: .ros1_test
  image: ${CI_IMAGE_REPOSITORY}:ros1-focal-${CI_COMMIT_SHORT_SHA}-arm64
  needs:
    - docker:ros1:orbvi:arm64
  tags:
    - orbvi
  rules: *default_or_tag_rules

ros2:ubuntu:x86_64:
  extends: .ros2_test
  image: ${CI_IMAGE_REPOSITORY}:ros2-focal-${CI_COMMIT_SHORT_SHA}-amd64
  needs:
    - docker:ros2:ubuntu:x86_64
  tags:
    - ubuntu
  rules: *default_or_tag_rules

ros2:orbvi:arm64:
  extends: .ros2_test
  image: ${CI_IMAGE_REPOSITORY}:ros2-focal-${CI_COMMIT_SHORT_SHA}-arm64
  needs:
    - docker:ros2:orbvi:arm64
  tags:
    - orbvi
  rules: *default_or_tag_rules
